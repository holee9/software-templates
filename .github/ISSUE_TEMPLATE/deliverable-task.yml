name: "📄 산출물 작성 태스크"
description: "개별 산출물 작성 진행 추적용 이슈"
title: "[산출물] "
labels: ["deliverable"]
body:
  - type: dropdown
    id: deliverable-id
    attributes:
      label: "산출물 ID"
      description: "작성할 산출물을 선택하세요"
      options:
        - "A01 — SW Development Plan (SDP)"
        - "A02 — SW Requirements Specification (SRS)"
        - "A03 — SW Architecture Design (SAD)"
        - "A04 — SOUP List"
        - "A05 — Configuration Management Plan (CMP)"
        - "A06 — SW Release Record"
        - "A07 — Source Code & Build Environment"
        - "A08 — Known Anomaly List"
        - "B01 — Integration Test Report"
        - "B02 — System Test Report"
        - "B03 — Requirements Traceability Matrix (RTM)"
        - "B04 — Usability Engineering Summary"
        - "B05 — Clinical Evaluation / Equivalence"
        - "C01 — SBOM (Software Bill of Materials)"
        - "C02 — VEX Report"
        - "C03 — Cybersecurity Controls Specification"
        - "C04 — Threat Model"
        - "C05 — Cybersecurity Risk Assessment"
        - "C06 — Penetration Test & Retest Report"
        - "C07 — Vulnerability Management Plan"
        - "D01 — Risk Management File (ISO 14971)"
        - "D02 — IEC 81001-5-1 Compliance"
        - "E01 — Predicate / SE Comparison"
        - "E02 — Labeling & IFU"
        - "E03 — GSPR Checklist"
        - "E04 — eSTAR v6.1 Submission Guide"
        - "F01 — Clinical Evaluation Report (CER)"
        - "F02 — PMS / PMCF Package"
    validations:
      required: true

  - type: input
    id: assignee
    attributes:
      label: "작성 담당자"
      placeholder: "예: 홍길동"
    validations:
      required: true

  - type: dropdown
    id: status
    attributes:
      label: "현재 상태"
      options:
        - "📝 Draft (초안 작성 중)"
        - "🔍 Review (검토 중)"
        - "✅ Approved (승인 완료)"
        - "🚫 Not Started (미착수)"
    validations:
      required: true

  - type: checkboxes
    id: target-market
    attributes:
      label: "타겟 시장"
      description: "이 산출물이 대응하는 시장을 선택하세요"
      options:
        - label: "FDA 510(k)"
        - label: "MFDS 2등급"
        - label: "EU MDR CE"

  - type: textarea
    id: dependencies
    attributes:
      label: "의존 산출물"
      description: "이 산출물 작성 전에 완료되어야 하는 선행 산출물"
      placeholder: |
        예:
        - A01 (SDP) — 완료 필요
        - D01 (Risk Management) — 병행 가능

  - type: textarea
    id: notes
    attributes:
      label: "비고"
      description: "추가 사항이 있으면 기재하세요"
